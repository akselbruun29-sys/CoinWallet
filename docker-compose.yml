services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    volumes:
      - wallet_data:/data
      - ./logs:/app/logs
    ports:
      - "8001:8001"
    restart: unless-stopped

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    environment:
      VITE_API_URL: http://api:8001
    ports:
      - "5173:5173"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    depends_on:
      - api
      - admin
    restart: unless-stopped

volumes:
  wallet_data:
  caddy_data:
