name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify API imports
        run: python -c "from api.main import app; print('api ok')"

      - name: Pre-release security gate (static)
        run: python scripts/verify_release_security.py

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: admin/package-lock.json

      - name: Build admin UI
        working-directory: admin
        run: |
          npm ci
          npm run build

      - name: Sync site release manifest
        run: node scripts/sync-site-releases.mjs

      - name: Verify release manifest hashes
        run: python scripts/verify-release-manifest.py
        continue-on-error: true

      - name: Build download site
        working-directory: site
        run: |
          npm ci
          npm run build
