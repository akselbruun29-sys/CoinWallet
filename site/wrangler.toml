# Cloudflare Pages project for the CoinWallet download site.
# Deploy: GitHub Actions (see .github/workflows/deploy-site.yml) or:
#   cd site && npm run build && npx wrangler pages deploy build --project-name=coinwallet
name = "coinwallet"
compatibility_date = "2025-06-01"
pages_build_output_dir = "build"

[[d1_databases]]
binding = "DB"
database_name = "coinwallet-leaderboard"
database_id = "1da2d7d2-58bd-4892-855b-e1bca0868209"
